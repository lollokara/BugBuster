name: Desktop Release

"on":
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            args: ""
          - name: Windows
            runner: windows-latest
            args: ""
          - name: Linux
            runner: ubuntu-22.04
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libudev-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            DesktopApp/BugBuster -> target

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Validate synchronized desktop version
        run: python DesktopApp/BugBuster/scripts/desktop_version.py --check

      - name: Validate tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          expected_version="${GITHUB_REF_NAME#desktop-v}"
          python DesktopApp/BugBuster/scripts/desktop_version.py --check --expect "$expected_version"

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: DesktopApp/BugBuster/src-tauri
          tauriScript: cargo tauri
          tagName: desktop-v__VERSION__
          releaseName: BugBuster Desktop v__VERSION__
          releaseBody: |
            Cross-platform desktop bundles for BugBuster.

            Assets are attached per platform by this workflow.
            Unsigned builds are suitable for testing, but production distribution should add macOS notarization and Windows code signing.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

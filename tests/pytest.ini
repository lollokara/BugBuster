[pytest]
markers =
    usb_only: test requires USB connection
    http_only: test requires HTTP connection
    requires_hat: test requires HAT expansion board
    destructive: test modifies device state (power, reset)
    slow: test takes > 5 seconds
    streaming: test requires USB streaming
    timeout: per-test timeout in seconds (requires pytest-timeout)
addopts = -v --tb=short --color=yes
testpaths = tests

; PlatformIO Project Configuration
; AD74416H Controller on ESP32-S3 (4MB Flash variant)
; Framework: ESP-IDF (migrated from Arduino)

[env:esp32s3]
platform = espressif32@6.9.0
board = dfrobot_firebeetle2_esp32s3
framework = espidf

; Serial monitor
monitor_speed = 115200
upload_port = COM10
monitor_port = COM13

; Partition table with SPIFFS for web files
board_build.partitions = partitions.csv
board_build.filesystem = spiffs



; PlatformIO Project Configuration
; AD74416H Controller on ESP32-S3 N16R8 (16 MB flash + 8 MB octal PSRAM)
; Framework: ESP-IDF (migrated from Arduino)

[env:esp32s3]
platform = espressif32@6.9.0
board = dfrobot_firebeetle2_esp32s3
framework = espidf

; Serial monitor
monitor_speed = 921600
upload_port = COM10
monitor_port = COM13

; Partition table with SPIFFS for web files
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

; Override the stock Firebeetle2 board (4 MB) to match the N16R8 module on the PCB.
; PSRAM is enabled via sdkconfig.defaults (CONFIG_SPIRAM_MODE_OCT=y).
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.psram_type = opi


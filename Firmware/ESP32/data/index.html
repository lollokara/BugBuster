  <body>
    <div id="app"></div>
    <!-- Vite injects __VITE_PRELOAD__ into dynamic imports but the polyfill
         chunk loads asynchronously and is unavailable when the first lazy route
         is triggered.  Define a no-op shim here so it is always available
         before any module script runs.  The shim just calls the import thunk
         directly, which is all that's needed on an embedded device. -->
    <!-- __VITE_PRELOAD__ is used as the deps-array arg in gzip-compressed chunks
         (Vite replaces it with [] in the .js files but after gzipEmitter runs).
         Setting it to [] means n.length===0 inside xe(), skipping the map() call. -->
    <script>window.__VITE_PRELOAD__ = []</script>
  </body>
